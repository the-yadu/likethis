<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#155e75;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="400" fill="url(#g)"/>
  <rect x="0" y="0" width="300" height="400" fill="rgba(0,0,0,0.2)"/>
  <!-- Decorative circles -->
  <circle cx="250" cy="50" r="80" fill="rgba(255,255,255,0.05)"/>
  <circle cx="30" cy="350" r="100" fill="rgba(255,255,255,0.05)"/>
  <!-- Camera icon -->
  <rect x="110" y="140" width="80" height="60" rx="8" ry="8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="150" cy="170" r="18" fill="rgba(255,255,255,0.3)"/>
  <circle cx="150" cy="170" r="12" fill="rgba(255,255,255,0.4)"/>
  <rect x="128" y="132" width="22" height="12" rx="4" ry="4" fill="rgba(255,255,255,0.2)"/>
  <!-- Template name -->
  <text x="50%" y="48%" font-family="sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle" opacity="0.95"><tspan x="50%" dy="0">Natural Light</tspan><tspan x="50%" dy="1.3em">Portrait</tspan></text>
  <!-- Category label -->
  <rect x="20" y="360" width="260" height="24" rx="12" fill="rgba(0,0,0,0.4)"/>
  <text x="150" y="376" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle" dominant-baseline="middle">PORTRAIT</text>
</svg>